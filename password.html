     PREMIUM PASSWORD UI
     HTML + CSS + JavaScript
=========================== -->
<!--
Premium Password Strength UI
Author : Santhosh Kumar
GitHub : https://github.com/santhoshanand/

Features
✔ Password Strength Meter
✔ Live Validation
✔ Show / Hide Password
✔ Animated Progress Bar
✔ Responsive
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Password Strength Checker</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">


<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#f4f4f4;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.card{

width:360px;

background:#fff;

padding:20px;

border-radius:18px;

box-shadow:0 15px 30px rgba(0,0,0,.12);

}
/*==========================
    INPUT BOX
==========================*/
.input-box{
    position: relative;
    border:2px solid #333;      /* Default Black */
    border-radius:15px;
    padding:12px 45px 12px 15px;
    transition:0.3s ease;
}

/* While typing */
.input-box.typing{
    border-color:#ff9800;
    box-shadow:0 0 8px rgba(255,152,0,.25);
}

/* Password Valid */
.input-box.success{
    border-color:#22c55e;
    box-shadow:0 0 8px rgba(34,197,94,.25);
}

.label{

position:absolute;

top:-10px;

left:18px;

background:#fff;

padding:0 8px;

font-size:14px;

color:#ff9800;

font-weight:600;

}

input{

width:100%;

border:none;

outline:none;

font-size:18px;

}
/*==========================
    PASSWORD RULES
==========================*/

#toggle{

position:absolute;

right:15px;

top:50%;

transform:translateY(-50%);

cursor:pointer;

color:#888;

}

.strength{

display:flex;

justify-content:space-between;

margin-top:18px;

font-size:13px;

}

.progress{

margin-top:8px;

height:5px;

background:#ddd;

border-radius:10px;

overflow:hidden;

}

.bar{

height:100%;

width:0%;

background:red;

transition:.3s;

}

.rules{

display:grid;

grid-template-columns:repeat(5,1fr);

margin-top:15px;

font-size:12px;

text-align:center;

gap:5px;

}

.valid{

color:#18a957;

font-weight:bold;

}

.invalid{

color:#d33;

}

</style>
</head>
<body>

<div class="card">

    <div class="input-box">

        <span class="label">Password</span>

        <input
        type="password"
        id="password"
        placeholder="Enter Password">

        <i class="fa-regular fa-eye" id="toggle"></i>

    </div>

    <div class="strength">

        <span>Password Strength</span>

        <span id="strengthText">Weak</span>

    </div>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div class="rules">

        <div id="length">○ 8+ Chars</div>
        <div id="upper">○ A-Z</div>
        <div id="lower">○ a-z</div>
        <div id="number">○ 123</div>
        <div id="symbol">○ @#$</div>

    </div>

</div>

<script>
const password=document.getElementById("password");
const bar=document.getElementById("bar");
const text=document.getElementById("strengthText");
const inputBox = document.querySelector(".input-box");
const toggle=document.getElementById("toggle");

toggle.onclick=()=>{

if(password.type==="password"){

password.type="text";

toggle.classList.replace("fa-eye","fa-eye-slash");

}else{

password.type="password";

toggle.classList.replace("fa-eye-slash","fa-eye");

}

};

password.addEventListener("input", () => {

    let value = password.value;
    let score = 0;

    const length = value.length >= 8;
    const upper = /[A-Z]/.test(value);
    const lower = /[a-z]/.test(value);
    const number = /[0-9]/.test(value);
    const symbol = /[^A-Za-z0-9]/.test(value);

    update("length", length);
    update("upper", upper);
    update("lower", lower);
    update("number", number);
    update("symbol", symbol);

    [length, upper, lower, number, symbol].forEach(v => {
        if(v) score++;
    });

    // -------- Border Color --------
    inputBox.classList.remove("typing","success");

    if(value.length === 0){
        // Default Black
    }
    else if(score === 5){
        inputBox.classList.add("success");   // Green
    }
    else{
        inputBox.classList.add("typing");    // Orange
    }

    // -------- Strength Bar --------
    bar.style.width = (score * 20) + "%";

    if(score <= 2){
        bar.style.background="#ff3b30";
        text.textContent="Weak";
        text.style.color="#ff3b30";
    }
    else if(score === 3){
        bar.style.background="#ff9800";
        text.textContent="Medium";
        text.style.color="#ff9800";
    }
    else if(score === 4){
        bar.style.background="#00b894";
        text.textContent="Strong";
        text.style.color="#00b894";
    }
    else{
        bar.style.background="#22c55e";
        text.textContent="Very Strong";
        text.style.color="#22c55e";
    }

});
function update(id,valid){

const el=document.getElementById(id);

if(valid){

el.className="valid";
el.innerHTML="✔ "+el.innerHTML.slice(2);

}else{

el.className="invalid";
el.innerHTML="○ "+el.innerHTML.slice(2);

}

}
</script>

</body>
</html>
